style: jacktimbers
friendship: false # not implemented
reputation: CopperGuild # not implemented
wallet:
  currency: silver
  max: 50
  restockInterval: 3600
  restockAmount: 100
rootMenu:
  type: selection
  gui: main
  options: # exactly 4 entries
    - type: quest
      quests:
        - quest: learning_to_jack_1
          items:
            - item: item-wood-spruce
              amount: 99
        - quest: learning_to_jack_2
          items:
            - item: item-wood-oak
              amount: 99
            - item: item-wood-birch
              amount: 99
    - type: shop
      bankDisplay:
        - gold
        - silver
      items:
        - item: item-wood-spruce
          buyStacks: true
          requirements:
            - variable: lumberjack_level
              min: 1
        - item: item-wood-oak
    - type: custom
      gui: lumberjack_training
    - type: custom
      gui: borrow_horn
