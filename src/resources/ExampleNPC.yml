style: jacktimbers
friendship: false # not implemented
wallet:
  currency: silver
  max: 50
  restockInterval: 3600
  restockAmount: 100
rootMenu:
  type: selection
  gui: main
  options: # exactly 4 entries
    - type: quest
      quests:
        - quest: learning_to_jack_1
          dialogue: learning_to_jack
          hint:
            title: "<gold>Learning to Jack"
            body:
              - <yellow>Hint:<white> You can learn wood at the lumbermill
              - <white>behind the mountain in Dwarven District,
              - <white>ask a guard for directions!
          items:
            - item: item-wood-spruce
              amount: 99
          completion:
            title: "<green>Quest Completed!"
            body:
              - <yellow>Reward:<white> 100 silver
              - <white>and access to new items in the shop!
          reward:
            - reputation: 12.5
            - item: money-silver
              amount: 100
            - variable: shop_lumberjack_unlocked
              operation: set
              amount: 1
        - quest: learning_to_jack_2
          dialogue: learning_to_jack
          items:
            - item: item-wood-oak
              amount: 99
            - item: item-wood-birch
              amount: 99
          reward:
            - variable: shop_lumberjack_unlocked
              operation: set
              amount: 1
    - type: shop
      bankDisplay:
        - gold
        - silver
      items:
        - item: item-wood-spruce
          buyStacks: true
          requirements:
            - variable: lumberjack_level
              min: 1
        - item: item-wood-oak
          limits:
            maxQuantity: 5
            restockInterval: 1800
            restockAmount: 1
    - type: custom
      gui: lumberjack_training
    - type: custom
      gui: borrow_horn

